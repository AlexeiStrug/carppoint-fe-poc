<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zamówienia — CarpPoint Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&amp;family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin">
  <aside class="sidebar"></aside>
  <div class="workspace">
    <header class="topbar"></header>
    <main class="content">
      <div class="page-head">
        <div><h1>Zamówienia</h1><p class="ph-sub">Realizacja, statusy i wysyłki</p></div>
        <div class="head-actions"><button class="btn btn-outline" id="exportBtn"></button></div>
      </div>

      <div class="kpi-row" id="miniKpi" style="margin-bottom:20px"></div>

      <div class="card">
        <div class="toolbar">
          <div class="seg" id="statusSeg"></div>
          <div class="grow"></div>
          <div class="tb-find" id="find"><input placeholder="Szukaj numeru lub klienta…" id="q"></div>
          <select class="selectbox" id="carrierSel"><option value="">Wszyscy przewoźnicy</option></select>
        </div>
        <div class="table-wrap">
          <table class="tbl">
            <thead><tr><th>Numer</th><th>Klient</th><th>Status</th><th>Płatność</th><th>Przewoźnik</th><th class="num">Kwota</th><th>Data</th><th class="c-actions"></th></tr></thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <div class="pager" id="pager"></div>
      </div>
    </main>
  </div>
</div>

<script src="admin-data.js"></script>
<script src="admin.js"></script>
<script>
AD.mount('orders','Zamówienia');
document.getElementById('exportBtn').innerHTML = AD.icon('download')+' Eksport CSV';
document.getElementById('exportBtn').addEventListener('click',()=>AD.toast('Eksport CSV gotowy','ok'));
document.getElementById('find').insertAdjacentHTML('afterbegin', AD.icon('search'));

const state={ f:'all', q:'', carrier:'', page:1, per:10 };

// mini KPIs
const sum = AD.orders.reduce((s,o)=>s+(o.status!=='CANCELLED'&&o.status!=='REFUNDED'?o.total:0),0);
const toShip = AD.orders.filter(o=>o.status==='PROCESSING'||o.status==='PAID').length;
const pending = AD.orders.filter(o=>o.status==='PENDING').length;
[['amber','cart','Wszystkie zamówienia',AD.orders.length],['blue','coins','Wartość (netto realiz.)',AD.zl(sum)],['purple','box','Do wysłania',toShip],['green','alert','Oczekuje płatności',pending]]
.forEach(()=>{});
document.getElementById('miniKpi').innerHTML = [
  ['amber','cart','Wszystkie zamówienia',AD.orders.length],
  ['blue','coins','Wartość zrealizowana',AD.zl(sum)],
  ['purple','box','Do wysłania',toShip],
  ['green','alert','Oczekuje płatności',pending],
].map(([c,i,l,v])=>`<div class="kpi"><div class="kpi-top"><div class="kpi-ic ${c}">${AD.icon(i)}</div></div><div class="kpi-label">${l}</div><div class="kpi-value" style="font-size:23px">${v}</div></div>`).join('');

// status segment
const segOrder=["all","PENDING","PAID","PROCESSING","SHIPPED","DELIVERED","CANCELLED"];
document.getElementById('statusSeg').innerHTML = segOrder.map(s=>{
  const cnt = s==='all'?AD.orders.length:AD.orders.filter(o=>o.status===s).length;
  const label = s==='all'?'Wszystkie':AD.statusMap[s][0];
  return `<button data-f="${s}" class="${s==='all'?'active':''}">${label} <span class="cnt">${cnt}</span></button>`;
}).join('');

// carriers
[...new Set(AD.orders.map(o=>o.carrier))].forEach(c=>{ const o=document.createElement('option'); o.value=c;o.textContent=c; document.getElementById('carrierSel').appendChild(o); });

function getList(){
  let l=AD.orders.slice();
  if(state.f!=='all') l=l.filter(o=>o.status===state.f);
  if(state.carrier) l=l.filter(o=>o.carrier===state.carrier);
  if(state.q){ const q=state.q.toLowerCase(); l=l.filter(o=>o.num.toLowerCase().includes(q)||o.customer.toLowerCase().includes(q)||o.email.toLowerCase().includes(q)); }
  return l;
}
function render(){
  const list=getList();
  const pages=Math.max(1,Math.ceil(list.length/state.per));
  state.page=Math.min(state.page,pages);
  const slice=list.slice((state.page-1)*state.per, state.page*state.per);
  document.getElementById('rows').innerHTML = slice.map(o=>`
    <tr style="cursor:pointer" data-num="${o.num}">
      <td><span class="mono" style="font-size:12.5px;font-weight:700">${o.num.slice(-6)}</span></td>
      <td><div class="tbl-cell-main"><span class="sb-av" style="width:30px;height:30px;font-size:11px;background:var(--brand-100);color:var(--brand-800)">${AD.initials(o.customer)}</span><span style="min-width:0"><span class="nm" style="font-size:13px">${o.customer}</span><span class="sub">${o.itemCount} ${o.itemCount===1?'pozycja':'pozycje'} · ${o.city}</span></span></div></td>
      <td>${AD.statusPill(o.status)}</td>
      <td class="small">${o.payment}</td>
      <td class="small muted">${o.carrier}</td>
      <td class="num" style="font-weight:700">${AD.zl(o.total)}</td>
      <td class="small muted">${o.date}</td>
      <td class="c-actions"><button class="ibtn" data-open="${o.num}">${AD.icon('chright')}</button></td>
    </tr>`).join('') || `<tr><td colspan="8"><div class="empty">${AD.icon('cart')}<p>Brak zamówień</p></div></td></tr>`;
  const from=list.length?(state.page-1)*state.per+1:0, to=Math.min(state.page*state.per,list.length);
  let pb=`<button ${state.page<=1?'disabled':''} data-pg="${state.page-1}">${AD.icon('chleft')}</button>`;
  for(let i=1;i<=pages;i++) pb+=`<button class="${i===state.page?'active':''}" data-pg="${i}">${i}</button>`;
  pb+=`<button ${state.page>=pages?'disabled':''} data-pg="${state.page+1}">${AD.icon('chright')}</button>`;
  document.getElementById('pager').innerHTML=`<span class="pinfo">Pokazano <b>${from}–${to}</b> z <b>${list.length}</b></span><div class="pbtns">${pb}</div>`;
}

document.getElementById('statusSeg').addEventListener('click',e=>{const b=e.target.closest('[data-f]');if(!b)return;state.f=b.dataset.f;state.page=1;document.querySelectorAll('#statusSeg button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();});
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value;state.page=1;render();});
document.getElementById('carrierSel').addEventListener('change',e=>{state.carrier=e.target.value;state.page=1;render();});
document.getElementById('pager').addEventListener('click',e=>{const b=e.target.closest('[data-pg]');if(!b||b.disabled)return;state.page=+b.dataset.pg;render();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('rows').addEventListener('click',e=>{const r=e.target.closest('[data-num]');if(r)openOrder(r.dataset.num);});

const STEPS=["PENDING","PAID","PROCESSING","SHIPPED","DELIVERED"];
const STEP_LABEL={PENDING:"Złożono zamówienie",PAID:"Opłacono",PROCESSING:"Skompletowano",SHIPPED:"Wysłano",DELIVERED:"Dostarczono"};

function openOrder(num){
  const o=AD.orders.find(x=>x.num===num); if(!o) return;
  const items = o.items.map(p=>`
    <div style="display:flex;gap:11px;align-items:center;padding:10px 0;border-bottom:1px solid var(--ink-150)">
      <span class="tbl-thumb ph" data-label="${AD.esc(p.label)}"></span>
      <div style="flex:1;min-width:0"><div class="nm" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${AD.esc(p.name)}</div><div class="sub small muted">${p.sku} · ${p.brand}</div></div>
      <div style="font-weight:700;white-space:nowrap">${AD.zl(p.price)}</div>
    </div>`).join('');
  const curIdx = STEPS.indexOf(o.status);
  const isFinal = o.status==='CANCELLED'||o.status==='REFUNDED';
  const timeline = STEPS.map((s,i)=>`<div class="tl-item ${i<=curIdx?'done':''}"><div class="tl-t">${STEP_LABEL[s]}</div><div class="tl-d">${i<=curIdx?o.date+(i===0?' · 09:1'+i:''):'—'}</div></div>`).join('');
  const next = AD.statusFlow[o.status]||[];
  const shipNote = (o.status==='SHIPPED'||o.status==='DELIVERED')&&o.tracking ? `<div class="card card-pad" style="margin-top:14px"><div style="display:flex;align-items:center;gap:10px"><span class="kpi-ic green" style="width:34px;height:34px">${AD.icon('truck')}</span><div><div style="font-weight:600;font-size:13px">${o.carrier}</div><div class="small muted mono">Nr przesyłki: ${o.tracking}</div></div><button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="AD.toast('Śledzenie przesyłki…')">Śledź</button></div></div>`:'';

  AD.openDrawer(`
    <div class="drawer-head">
      <div><h3>${o.num.slice(-6)} ${AD.statusPill(o.status)}</h3><div class="dh-sub mono">${o.num} · ${o.date}</div></div>
      <button class="ibtn" data-close-drawer>${AD.icon('x')}</button>
    </div>
    <div class="drawer-body">
      <div class="grid-2" style="gap:14px;margin-bottom:16px">
        <div class="card card-pad">
          <div class="small muted" style="font-weight:600;margin-bottom:6px">Klient</div>
          <div style="font-weight:700">${o.customer}</div>
          <div class="small muted">${o.email}</div>
          <div class="small muted">${o.city}, Polska</div>
        </div>
        <div class="card card-pad">
          <div class="small muted" style="font-weight:600;margin-bottom:6px">Płatność i dostawa</div>
          <div class="small">Metoda: <b>${o.payment}</b></div>
          <div class="small">Przewoźnik: <b>${o.carrier}</b></div>
          <div class="small">VAT: <b>${o.vat}%</b></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3 style="font-size:14px">Pozycje (${o.itemCount})</h3><b>${AD.zl(o.total)}</b></div>
        <div class="card-pad" style="padding-top:6px">${items}
          <div style="display:flex;justify-content:space-between;padding-top:12px;font-weight:800;font-family:var(--font-display)"><span>Razem</span><span>${AD.zl(o.total)}</span></div>
        </div>
      </div>

      ${shipNote}

      ${!isFinal?`<div class="card card-pad" style="margin-top:16px">
        <div class="small muted" style="font-weight:600;margin-bottom:10px">Zmień status</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${next.map(s=>`<button class="btn ${s==='CANCELLED'||s==='REFUNDED'?'btn-danger':'btn-primary'} btn-sm" data-set="${s}">→ ${AD.statusMap[s][0]}</button>`).join('') || '<span class="small muted">Brak dalszych statusów</span>'}
        </div>
        ${o.status==='PROCESSING'||o.status==='PAID'?`<div class="field" style="margin-top:14px;margin-bottom:0"><label>Dodaj numer przesyłki</label><div style="display:flex;gap:8px"><input class="input" placeholder="np. 6200 1234 5678" id="trkInput"><button class="btn btn-outline btn-sm" id="addTrk">Dodaj</button></div></div>`:''}
      </div>`:''}

      <div class="card card-pad" style="margin-top:16px">
        <div class="small muted" style="font-weight:600;margin-bottom:14px">Historia statusu</div>
        <div class="timeline">${timeline}</div>
      </div>

      <div class="field" style="margin-top:16px;margin-bottom:0">
        <label>Notatka administratora (wewnętrzna)</label>
        <textarea class="input" placeholder="Widoczna tylko dla zespołu…">${AD.esc(o.note)}</textarea>
      </div>
    </div>
    <div class="drawer-foot">
      <button class="btn btn-ghost" onclick="AD.toast('Faktura PDF wygenerowana','ok')">${AD.icon('download')} Faktura PDF</button>
      <button class="btn btn-primary" data-close-drawer onclick="AD.toast('Zmiany zapisane','ok')">Zapisz</button>
    </div>`, {wide:true});

  const d=document.getElementById('adDrawer');
  d.querySelectorAll('[data-set]').forEach(b=>b.addEventListener('click',()=>{ o.status=b.dataset.set; if(o.status==='SHIPPED'&&!o.tracking)o.tracking='6200 '+Math.floor(Math.random()*9000+1000)+' '+Math.floor(Math.random()*9000+1000); AD.closeDrawer(); render(); AD.toast('Status zmieniony na: '+AD.statusMap[o.status][0],'ok'); }));
  const at=d.querySelector('#addTrk'); if(at) at.addEventListener('click',()=>{ const v=d.querySelector('#trkInput').value; o.tracking=v||o.tracking; AD.toast('Numer przesyłki dodany','ok'); });
}

render();
</script>
</body>
</html>
